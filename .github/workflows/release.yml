name: Build and Release

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-4-dev \
            libadwaita-1-dev \
            libgtk4-layer-shell-dev \
            libpulse-dev \
            pkg-config \
            build-essential

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release
        run: cargo build --release

      - name: Prepare release artifacts
        run: |
          mkdir -p release/bin
          mkdir -p release/themes
          mkdir -p release/config

          # Copy binaries
          cp target/release/rw release/bin/ 2>/dev/null || true
          cp target/release/rw-stats release/bin/ 2>/dev/null || true
          cp target/release/rw-control release/bin/ 2>/dev/null || true
          cp target/release/rw-media release/bin/ 2>/dev/null || true
          cp target/release/rw-volume release/bin/ 2>/dev/null || true

          # Copy themes
          cp themes/*.css release/themes/ 2>/dev/null || true

          # Copy install script
          cp install-local.sh release/
          chmod +x release/install-local.sh

          # Create tarball
          cd release
          tar -czvf ../rust-widgets-x86_64-linux.tar.gz .
          cd ..

      - name: Generate release tag
        id: tag
        run: |
          # Use date-based versioning: v0.1.0-YYYYMMDD.HHMM
          TAG="v0.1.0-$(date +'%Y%m%d.%H%M')"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Delete existing latest release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: latest
          github_token: ${{ secrets.GITHUB_TOKEN }}
          delete_release: true
        continue-on-error: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Release ${{ steps.tag.outputs.tag }}"
          body: |
            ## Rust Widgets Release

            **Commit:** ${{ github.sha }}
            **Branch:** ${{ github.ref_name }}
            **Built:** ${{ steps.tag.outputs.tag }}

            ### Installation

            ```bash
            # Download and extract
            tar -xzf rust-widgets-x86_64-linux.tar.gz

            # Run install script
            ./install-local.sh
            ```

            Or manually copy binaries to `~/.local/bin/`

            ### Included Binaries
            - `rw` - CLI launcher
            - `rw-stats` - System stats popup
            - `rw-control` - Control center
            - `rw-media` - Media player widget
            - `rw-volume` - Volume control widget
          files: |
            rust-widgets-x86_64-linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update latest tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Release"
          body: |
            ## Latest Build

            This is always the most recent build from the master branch.

            **Commit:** ${{ github.sha }}
            **Built:** ${{ steps.tag.outputs.tag }}

            ### Quick Install

            ```bash
            curl -L https://github.com/${{ github.repository }}/releases/download/latest/rust-widgets-x86_64-linux.tar.gz | tar -xz
            ./install-local.sh
            ```
          files: |
            rust-widgets-x86_64-linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
